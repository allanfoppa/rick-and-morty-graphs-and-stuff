name: Trigger QA Hub (Rick & Morty)

on:
  push:
    branches: [main]

jobs:
  notify-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch Event to QA Hub
        env:
          GH_TOKEN: ${{ secrets.QA_HUB_PAT }}
        run: |
          set -euo pipefail

          EVENT_TYPE="run-rick-and-morty-graphs-and-stuff-frontend-tests"
          REPO="${{ github.repository }}"
          PORT="3000"
          APP_ROOT="app"

          echo "🚀 Dispatching $EVENT_TYPE"

          curl -i -L -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/allanfoppa/ai-qa-testing-hub/dispatches \
            -d "{
              \"event_type\": \"$EVENT_TYPE\",
              \"client_payload\": {
                \"qaContract\": \"v1\",
                \"repo\": \"$REPO\",
                \"app\": {
                  \"root\": \"$APP_ROOT\"
                },
                \"server\": {
                  \"port\": $PORT,
                  \"healthcheck\": \"http://localhost:3000\"
                }
              }
            }"
